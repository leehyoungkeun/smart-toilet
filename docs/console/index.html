<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>스마트 화장실 운영 콘솔</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background:#EAF0F9; color:#16223C; }
  .header { background:linear-gradient(90deg,#15408F,#2C6CD0); color:#fff; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
  .header .t { font-size:20px; font-weight:700; }
  .header .r { display:flex; align-items:center; gap:14px; font-size:14px; }
  .btn { border:0; border-radius:10px; padding:9px 16px; font-weight:600; font-size:14px; cursor:pointer; background:#2C6CD0; color:#fff; }
  .btn.ghost { background:rgba(255,255,255,.15); color:#fff; }
  .wrap { max-width:1200px; margin:0 auto; padding:24px; }
  /* login */
  .login { max-width:400px; margin:8vh auto; background:#fff; border:1px solid #ECF1F9; border-radius:18px; padding:32px; }
  .login h1 { font-size:22px; margin:0 0 4px; }
  .login p { color:#6B7A95; font-size:14px; margin:0 0 20px; }
  .login input { width:100%; height:48px; border:1px solid #E2E9F4; border-radius:12px; padding:0 14px; font-size:15px; margin-bottom:12px; }
  .err { color:#E0322F; font-size:14px; margin:6px 0; }
  /* kpi */
  .kpis { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:20px; }
  .kpi { background:#fff; border:1px solid #ECF1F9; border-radius:14px; padding:16px; }
  .kpi .l { font-size:13px; color:#6B7A95; }
  .kpi .v { font-size:26px; font-weight:700; margin-top:4px; }
  .kpi .v.warn { color:#B5730A; } .kpi .v.bad { color:#E0322F; } .kpi .v.ok { color:#1FA463; }
  /* table */
  .card { background:#fff; border:1px solid #ECF1F9; border-radius:16px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th,td { text-align:left; padding:12px 14px; border-bottom:1px solid #F0F3F9; white-space:nowrap; }
  th { background:#F7F9FD; color:#6B7A95; font-weight:600; font-size:12px; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
  .on { background:#1FA463; } .off { background:#C7CFDB; }
  .pill { border-radius:999px; padding:3px 9px; font-size:12px; font-weight:700; }
  .pill.low { background:#FCEFD6; color:#B5730A; } .pill.okp { background:#E4F6EC; color:#138A55; }
  .muted { color:#8492AB; }
  .bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .bar h2 { font-size:18px; margin:0; }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://jrcvrlyvkdoxtjlhmapm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JD6Mcz3_Hk2N5jX0zauvLg_pGihCjYn';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
const app = document.getElementById('app');

const ROLE_LABEL = { platform_admin:'플랫폼 관리자(전체)', org_admin:'지자체 관리자', operator:'운영자' };

function esc(s){ return String(s==null?'':s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function renderLogin(msg){
  app.innerHTML = `
    <div class="login">
      <h1>운영 콘솔 로그인</h1>
      <p>지자체·단체 계정으로 로그인하면 담당 화장실만 표시됩니다.</p>
      <input id="email" type="email" placeholder="이메일" autocomplete="username" />
      <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password" />
      ${msg ? `<div class="err">${esc(msg)}</div>` : ''}
      <button class="btn" id="go" style="width:100%;height:48px;">로그인</button>
    </div>`;
  document.getElementById('go').onclick = async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('pw').value;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) return renderLogin('로그인 실패: 이메일/비밀번호를 확인하세요.');
    renderDashboard();
  };
}

async function renderDashboard(){
  app.innerHTML = `<div class="header"><div class="t">스마트 화장실 운영 콘솔</div>
    <div class="r"><span id="who" class="muted"></span>
    <button class="btn ghost" id="refresh">새로고침</button>
    <button class="btn ghost" id="logout">로그아웃</button></div></div>
    <div class="wrap"><div id="body">불러오는 중…</div></div>`;

  document.getElementById('logout').onclick = async () => { await supabase.auth.signOut(); renderLogin(); };
  document.getElementById('refresh').onclick = load;

  // 역할 표시
  const { data: { user } } = await supabase.auth.getUser();
  const { data: prof } = await supabase.from('profiles').select('full_name, role').eq('id', user.id).maybeSingle();
  document.getElementById('who').textContent =
    (prof?.full_name ? prof.full_name+' · ' : '') + (ROLE_LABEL[prof?.role] || '권한 없음');

  load();
}

async function load(){
  const body = document.getElementById('body');
  body.innerHTML = '불러오는 중…';
  const [{ data: ov, error: e1 }, { data: locs, error: e2 }] = await Promise.all([
    supabase.rpc('fleet_overview'),
    supabase.rpc('fleet_locations'),
  ]);
  if (e1 || e2){ body.innerHTML = `<div class="err">데이터 조회 실패: ${esc((e1||e2).message)}</div>`; return; }

  const kpi = (l,v,cls='')=>`<div class="kpi"><div class="l">${l}</div><div class="v ${cls}">${v}</div></div>`;
  const kpis = `<div class="kpis">
    ${kpi('화장실', ov.locations)}
    ${kpi('온라인', ov.online, 'ok')}
    ${kpi('오프라인', ov.offline, ov.offline>0?'bad':'')}
    ${kpi('재고부족', ov.low_stock, ov.low_stock>0?'warn':'')}
    ${kpi('미처리 민원', ov.open_complaints, ov.open_complaints>0?'warn':'')}
    ${kpi('오늘 안심이벤트', ov.safety_today)}
  </div>`;

  const rows = (locs||[]).map(r=>`
    <tr>
      <td><span class="dot ${r.online?'on':'off'}"></span>${r.online?'온라인':'오프라인'}</td>
      <td>${esc(r.code)}</td>
      <td>${esc(r.name)}</td>
      <td class="muted">${esc(r.org_name)} · ${esc(r.sigungu||'')}</td>
      <td>${r.pad_qty==null?'-':`<span class="pill ${r.pad_qty<=10?'low':'okp'}">${r.pad_qty}/${r.pad_cap}</span>`}</td>
      <td>${r.open_complaints>0?`<span class="pill low">${r.open_complaints}건</span>`:'<span class="muted">0</span>'}</td>
      <td class="muted">${r.temperature==null?'-':`${r.temperature}°C · ${r.humidity}% · PM${r.pm25}`}</td>
    </tr>`).join('');

  body.innerHTML = kpis + `
    <div class="bar"><h2>화장실 현황 (${(locs||[]).length})</h2></div>
    <div class="card"><table>
      <thead><tr><th>상태</th><th>코드</th><th>이름</th><th>소속</th><th>재고</th><th>민원</th><th>환경</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="7" class="muted">표시할 화장실이 없습니다.</td></tr>'}</tbody>
    </table></div>`;
}

// 세션 있으면 대시보드, 없으면 로그인
const { data: { session } } = await supabase.auth.getSession();
if (session) renderDashboard(); else renderLogin();
</script>
</body>
</html>
